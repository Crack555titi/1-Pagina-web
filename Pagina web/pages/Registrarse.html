<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Crear Cuenta | Aerum Club</title>

    <link rel="stylesheet" href="/Pagina web/CSS/estilos.css">
    <link rel="stylesheet" href="/Pagina web/CSS/registrarse.css">

</head>

<body>

<div class="register-container">

    <form class="register-box" id="registerForm">

        <h2>Crear Cuenta</h2>

        <div class="input-group">

            <label>Nombre</label>

            <input
                type="text"
                id="nombre"
                placeholder="Nombre"
                required
            >

            <small id="nombreError"></small>

        </div>

        <div class="input-group">

            <label>Apellido</label>

            <input
                type="text"
                id="apellido"
                placeholder="Apellido"
                required
            >

            <small id="apellidoError"></small>

        </div>

        <div class="input-group">

            <label>Correo electrónico</label>

            <input
                type="email"
                id="email"
                placeholder="correo@ejemplo.com"
                required
            >

            <small id="emailError"></small>

        </div>

        <div class="input-group">

            <label>Contraseña</label>

            <input
                type="password"
                id="password"
                placeholder="********"
                required
            >

            <small id="passwordError"></small>

        </div>

        <div class="input-group">

            <label>Confirmar contraseña</label>

            <input
                type="password"
                id="confirmPassword"
                placeholder="********"
                required
            >

            <small id="confirmError"></small>

        </div>

        <button type="submit">

            Registrarme

        </button>

        <p class="login-link">

            ¿Ya tienes una cuenta?

            <a href="login.html">

                Inicia sesión

            </a>

        </p>

    </form>

</div>

<script src="register.js"></script>

</body>

</html>
